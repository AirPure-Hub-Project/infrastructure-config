services:
  kong:
    image: kong:3.7
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml
      KONG_PROXY_LISTEN: 0.0.0.0:8000
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
    volumes:
      - ./kong.yml:/kong/declarative/kong.yml:ro
    networks:
      - frontend_net
      - backend_net
    ports:
      - "8000:8000"
      - "8001:8001"
    depends_on:
      - auth-service
      - logic-service

  auth-service:
    build: ../auth-service
    environment:
      - IO_SERVICE_URL=http://io-service:7000
      - JWT_SECRET=cheie_secreta_idp
    networks:
      - backend_net
    depends_on:
      - io-service

  logic-service:
    build: ../logic-service
    environment:
      - IO_SERVICE_URL=http://io-service:7000
      - JWT_SECRET=cheie_secreta_idp
      - AUTH_REQUIRED=true
    networks:
      - backend_net
    depends_on:
      - io-service

  io-service:
    build: ../io-service
    restart: on-failure
    environment:
      - PORT=7000
      - INFLUX_URL=http://db_influx:8086
      - INFLUX_ORG=airpure
      - INFLUX_BUCKET=sensor_data
      - INFLUX_TOKEN=airpure-dev-token
      - POSTGRES_URL=postgres://user:password@db_postgre:5432/airpure_users
    networks:
      - backend_net
    depends_on:
      db_postgre:
        condition: service_healthy
      db_influx:
        condition: service_healthy

  db_postgre:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: airpure_users
    volumes:
      - postgre_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d airpure_users"]
      interval: 5s
      timeout: 5s
      retries: 10

  db_influx:
    image: influxdb:2.7-alpine
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: airpure
      DOCKER_INFLUXDB_INIT_BUCKET: sensor_data
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: airpure-dev-token
    volumes:
      - influx_data:/var/lib/influxdb2
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8086/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer
    ports:
      - "8080:8080"
    networks:
      - backend_net
    depends_on:
      - db_postgre

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - backend_net

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - backend_net
    depends_on:
      - prometheus

  portainer:
    image: portainer/portainer-ce:2.21.1
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - backend_net

networks:
  frontend_net:
  backend_net:

volumes:
  postgre_data:
  influx_data:
  grafana_data:
  portainer_data:
